name: Build AdShield Patches

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday midnight UTC

# ─── Target APK versions ───────────────────────────────────────────────────────
# TODO: Update these when `java -jar revanced-cli.jar list-patches --with-packages
#       revanced-patches.rvp` shows a newer compatible version.
# Check current support at: https://revanced.app/patches
env:
  YOUTUBE_PKG:           com.google.android.youtube
  YOUTUBE_VERSION:       "19.47.53"
  YOUTUBE_MUSIC_PKG:     com.google.android.apps.youtube.music
  YOUTUBE_MUSIC_VERSION: "7.25.52"
  SPOTIFY_PKG:           com.spotify.music
  SPOTIFY_VERSION:       "8.6.96.1103"

jobs:
  patch-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      # ── Setup ─────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate secrets
        run: |
          missing=""
          [ -z "${{ secrets.KEYSTORE_BASE64 }}"  ] && missing="$missing KEYSTORE_BASE64"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && missing="$missing KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_ALIAS }}"         ] && missing="$missing KEY_ALIAS"
          [ -z "${{ secrets.KEY_PASSWORD }}"      ] && missing="$missing KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub secrets:$missing"
            echo "See PATCHES.md → 'One-time setup' for instructions."
            exit 1
          fi

      - name: Set release tag
        id: tag
        run: |
          echo "TAG=v$(date +%Y.%m.%d)"     >> $GITHUB_OUTPUT
          echo "DATE=$(date '+%Y-%m-%d')"   >> $GITHUB_OUTPUT

      # ── Download ReVanced tools ────────────────────────────────────────────────
      - name: Download ReVanced CLI and patches
        id: tools
        run: |
          # Fetch each release JSON once; extract URL + version tag from the same response.
          # Use endswith() instead of test() regex to avoid backslash-escaping issues in YAML.

          CLI_JSON=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/ReVanced/revanced-cli/releases/latest")
          CLI_URL=$(echo "$CLI_JSON" \
            | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' \
            | head -1)
          CLI_VER=$(echo "$CLI_JSON" | jq -r '.tag_name')

          PATCHES_JSON=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/ReVanced/revanced-patches/releases/latest")
          PATCHES_URL=$(echo "$PATCHES_JSON" \
            | jq -r '.assets[] | select(.name | (endswith(".rvp") or endswith(".jar"))) | .browser_download_url' \
            | head -1)
          PATCHES_VER=$(echo "$PATCHES_JSON" | jq -r '.tag_name')

          # Fail loudly if either URL is empty — prevents a silent curl to nowhere
          if [ -z "$CLI_URL" ]; then
            echo "::error::Could not resolve ReVanced CLI download URL. Check the API response above."
            exit 1
          fi
          if [ -z "$PATCHES_URL" ]; then
            echo "::error::Could not resolve ReVanced Patches download URL. Check the API response above."
            exit 1
          fi

          echo "CLI URL:     $CLI_URL"
          echo "Patches URL: $PATCHES_URL"

          curl -sfL "$CLI_URL"     -o revanced-cli.jar
          curl -sfL "$PATCHES_URL" -o revanced-patches.rvp

          echo "CLI_VER=$CLI_VER"         >> $GITHUB_OUTPUT
          echo "PATCHES_VER=$PATCHES_VER" >> $GITHUB_OUTPUT
          echo "ReVanced CLI $CLI_VER, Patches $PATCHES_VER"

      # ── Download APKs from APKPure ─────────────────────────────────────────────
      - name: Install apkeep
        run: |
          APKEEP_URL=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/EFForg/apkeep/releases/latest" \
          | jq -r '.assets[] | select(.name | (contains("x86_64") and contains("linux"))) | .browser_download_url' \
          | head -1)
          if [ -z "$APKEEP_URL" ]; then
            echo "::error::Could not resolve apkeep download URL"
            exit 1
          fi
          curl -sfL "$APKEEP_URL" -o apkeep
          chmod +x apkeep

      - name: Download APKs from APKPure
        run: |
          # Downloads <pkg>@<version> from APKPure via apkeep.
          # APKPure sometimes bundles apps as .xapk (ZIP of split APKs);
          # we extract just the base APK in that case.
          fetch_apk() {
            local pkg=$1 version=$2 out=$3

            echo "==> $pkg @ $version"
            ./apkeep -a "${pkg}@${version}" -d APKPure . 2>&1 || true

            if [ -f "${pkg}_${version}.apk" ]; then
              mv "${pkg}_${version}.apk" "$out"
            elif [ -f "${pkg}_${version}.xapk" ]; then
              echo "XAPK detected — extracting base APK"
              unzip -p "${pkg}_${version}.xapk" "${pkg}.apk" > "$out"
            else
              # Fallback: find any apkeep output file (version string may differ)
              local found
              found=$(find . -maxdepth 1 \
                \( -name "${pkg}*.apk" -o -name "${pkg}*.xapk" \) \
                ! -name "*revanced*" | head -1)
              if [ -z "$found" ]; then
                echo "ERROR: no APK downloaded for $pkg" >&2
                return 1
              fi
              [[ "$found" == *.xapk ]] \
                && unzip -p "$found" "${pkg}.apk" > "$out" \
                || mv "$found" "$out"
            fi
            echo "OK: $(du -sh "$out")"
          }

          fetch_apk "$YOUTUBE_PKG"       "$YOUTUBE_VERSION"       youtube-original.apk       || echo "YT_FAIL=1"  >> $GITHUB_ENV
          fetch_apk "$YOUTUBE_MUSIC_PKG" "$YOUTUBE_MUSIC_VERSION" youtube-music-original.apk || echo "YTM_FAIL=1" >> $GITHUB_ENV
          fetch_apk "$SPOTIFY_PKG"       "$SPOTIFY_VERSION"       spotify-original.apk        || echo "SPO_FAIL=1" >> $GITHUB_ENV

      # ── Signing keystore ──────────────────────────────────────────────────────
      - name: Restore signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      # ── Patch each app ────────────────────────────────────────────────────────
      # Each step is independent; continue-on-error keeps the rest running even if
      # one app's patch fails (e.g. because ReVanced dropped support for that version).
      - name: Patch YouTube
        if: env.YT_FAIL != '1'
        continue-on-error: true
        run: |
          java -jar revanced-cli.jar patch \
            --patch-bundle            revanced-patches.rvp \
            --keystore                release.keystore \
            --keystore-entry-alias    "${{ secrets.KEY_ALIAS }}" \
            --keystore-entry-password "${{ secrets.KEY_PASSWORD }}" \
            --keystore-password       "${{ secrets.KEYSTORE_PASSWORD }}" \
            -o youtube-revanced.apk \
            youtube-original.apk

      - name: Patch YouTube Music
        if: env.YTM_FAIL != '1'
        continue-on-error: true
        run: |
          java -jar revanced-cli.jar patch \
            --patch-bundle            revanced-patches.rvp \
            --keystore                release.keystore \
            --keystore-entry-alias    "${{ secrets.KEY_ALIAS }}" \
            --keystore-entry-password "${{ secrets.KEY_PASSWORD }}" \
            --keystore-password       "${{ secrets.KEYSTORE_PASSWORD }}" \
            -o youtube-music-revanced.apk \
            youtube-music-original.apk

      - name: Patch Spotify
        if: env.SPO_FAIL != '1'
        continue-on-error: true
        run: |
          java -jar revanced-cli.jar patch \
            --patch-bundle            revanced-patches.rvp \
            --keystore                release.keystore \
            --keystore-entry-alias    "${{ secrets.KEY_ALIAS }}" \
            --keystore-entry-password "${{ secrets.KEY_PASSWORD }}" \
            --keystore-password       "${{ secrets.KEYSTORE_PASSWORD }}" \
            -o spotify-revanced.apk \
            spotify-original.apk

      # ── Build AdShield app ────────────────────────────────────────────────────
      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" "build-tools;36.1.0" 2>&1 | tail -5

      - name: Build and sign AdShield APK
        id: adshield
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

          UNSIGNED=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then
            echo "Gradle build produced no APK — skipping signing"
            exit 0
          fi

          TOOLS=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d \
                  | sort -V | tail -1)
          "$TOOLS/zipalign"  -v 4 "$UNSIGNED" adshield-aligned.apk
          "$TOOLS/apksigner" sign \
            --ks           release.keystore \
            --ks-pass      "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass     "pass:${{ secrets.KEY_PASSWORD }}" \
            --out          adshield-release.apk \
            adshield-aligned.apk
          echo "AdShield signed: $(du -sh adshield-release.apk)"

      # ── Publish release ───────────────────────────────────────────────────────
      - name: Build release notes
        id: notes
        run: |
          row() {
            local file=$1 label=$2
            [ -f "$file" ] \
              && echo "| $label | ✅ Patched |" \
              || echo "| $label | ❌ Failed — [see logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          }
          {
            echo "BODY<<DELIMEOF"
            echo "## AdShield Patches — ${{ steps.tag.outputs.DATE }}"
            echo ""
            echo "### Assets"
            echo "| App | Status |"
            echo "|-----|--------|"
            row youtube-revanced.apk       "YouTube ReVanced (v${YOUTUBE_VERSION})"
            row youtube-music-revanced.apk "YouTube Music ReVanced (v${YOUTUBE_MUSIC_VERSION})"
            row spotify-revanced.apk       "Spotify ReVanced (v${SPOTIFY_VERSION})"
            row adshield-release.apk       "AdShield app"
            echo ""
            echo "### Tool versions"
            echo "- ReVanced CLI: \`${{ steps.tools.outputs.CLI_VER }}\`"
            echo "- ReVanced Patches: \`${{ steps.tools.outputs.PATCHES_VER }}\`"
            echo ""
            echo "*Auto-built by [GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
            echo "DELIMEOF"
          } >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:                ${{ steps.tag.outputs.TAG }}
          name:                    "AdShield Patches — ${{ steps.tag.outputs.DATE }}"
          body:                    ${{ steps.notes.outputs.BODY }}
          make_latest:             "true"
          fail_on_unmatched_files: false
          files: |
            youtube-revanced.apk
            youtube-music-revanced.apk
            spotify-revanced.apk
            adshield-release.apk

      # ── Job summary ───────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          {
            echo "## ${{ steps.tag.outputs.DATE }} patch results"
            echo "| App | Result |"
            echo "|-----|--------|"
            [ -f youtube-revanced.apk ]       && echo "| YouTube       | ✅ |" || echo "| YouTube       | ❌ |"
            [ -f youtube-music-revanced.apk ] && echo "| YouTube Music | ✅ |" || echo "| YouTube Music | ❌ |"
            [ -f spotify-revanced.apk ]       && echo "| Spotify       | ✅ |" || echo "| Spotify       | ❌ |"
            [ -f adshield-release.apk ]       && echo "| AdShield      | ✅ |" || echo "| AdShield      | ❌ |"
          } >> $GITHUB_STEP_SUMMARY
