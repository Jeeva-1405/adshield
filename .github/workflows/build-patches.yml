name: Build AdShield Patches

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday midnight UTC

env:
  YOUTUBE_PKG:           com.google.android.youtube
  YOUTUBE_VERSION:       "19.47.53"
  YOUTUBE_MUSIC_PKG:     com.google.android.apps.youtube.music
  YOUTUBE_MUSIC_VERSION: "7.25.52"
  SPOTIFY_PKG:           com.spotify.music
  SPOTIFY_VERSION:       "8.6.96.1103"

jobs:
  patch-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set release tag
        run: |
          echo "TAG=v$(date +%Y.%m.%d)"   >> $GITHUB_ENV
          echo "DATE=$(date '+%Y-%m-%d')" >> $GITHUB_ENV

      # ── Download ReVanced tools ────────────────────────────────────────────────
      - name: Download ReVanced CLI
        id: cli
        run: |
          CLI_JSON=$(curl -sS \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ReVanced/revanced-cli/releases/latest")

          CLI_VER=$(echo "$CLI_JSON" | jq -r '.tag_name')
          CLI_URL=$(echo "$CLI_JSON" \
            | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' \
            | head -1)

          if [ -z "$CLI_URL" ] || [ "$CLI_URL" = "null" ]; then
            echo "::error::No .jar asset in revanced-cli release. Available:"
            echo "$CLI_JSON" | jq -r '.assets[].name'
            exit 1
          fi

          echo "CLI URL: $CLI_URL ($CLI_VER)"
          curl -sS -L --fail-with-body "$CLI_URL" -o revanced-cli.jar
          echo "CLI_VER=$CLI_VER" >> $GITHUB_OUTPUT

      - name: Download ReVanced Patches
        id: patches
        run: |
          PATCHES_JSON=$(curl -sS \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/anddea/revanced-patches/releases/latest")

          PATCHES_VER=$(echo "$PATCHES_JSON" | jq -r '.tag_name')
          PATCHES_URL=$(echo "$PATCHES_JSON" \
            | jq -r '.assets[] | select(.name | endswith(".mpp")) | .browser_download_url' \
            | head -1)

          if [ -z "$PATCHES_URL" ] || [ "$PATCHES_URL" = "null" ]; then
            echo "::error::No .mpp asset in anddea/revanced-patches release. Available:"
            echo "$PATCHES_JSON" | jq -r '.assets[].name'
            exit 1
          fi

          echo "PATCHES URL: $PATCHES_URL ($PATCHES_VER)"
          curl -sS -L --fail-with-body "$PATCHES_URL" -o patches.mpp
          echo "PATCHES_VER=$PATCHES_VER" >> $GITHUB_OUTPUT

      # ── Install apkeep ─────────────────────────────────────────────────────────
      - name: Install apkeep
        run: |
          APKEEP_JSON=$(curl -sS \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/EFForg/apkeep/releases/latest")

          APKEEP_URL=$(echo "$APKEEP_JSON" \
            | jq -r '.assets[] | select(.name | (contains("x86_64") and contains("linux"))) | .browser_download_url' \
            | head -1)

          if [ -z "$APKEEP_URL" ] || [ "$APKEEP_URL" = "null" ]; then
            echo "::error::No x86_64 Linux apkeep asset found. Available:"
            echo "$APKEEP_JSON" | jq -r '.assets[].name'
            exit 1
          fi

          echo "apkeep URL: $APKEEP_URL"
          curl -sS -L --fail-with-body "$APKEEP_URL" -o apkeep
          chmod +x apkeep

      # ── Download APKs ──────────────────────────────────────────────────────────
      - name: Download YouTube APK
        id: dl_yt
        continue-on-error: true
        run: |
          echo "Downloading YouTube $YOUTUBE_VERSION"
          ./apkeep -a "${YOUTUBE_PKG}@${YOUTUBE_VERSION}" -d APKPure . 2>&1 || true

          if [ -f "${YOUTUBE_PKG}_${YOUTUBE_VERSION}.apk" ]; then
            mv "${YOUTUBE_PKG}_${YOUTUBE_VERSION}.apk" youtube.apk
          elif [ -f "${YOUTUBE_PKG}_${YOUTUBE_VERSION}.xapk" ]; then
            unzip -p "${YOUTUBE_PKG}_${YOUTUBE_VERSION}.xapk" "${YOUTUBE_PKG}.apk" > youtube.apk
          else
            FOUND=$(find . -maxdepth 1 \
              \( -name "${YOUTUBE_PKG}*.apk" -o -name "${YOUTUBE_PKG}*.xapk" \) \
              ! -name "*revanced*" | head -1)
            if [ -z "$FOUND" ]; then echo "ERROR: no APK downloaded for YouTube" && exit 1; fi
            [[ "$FOUND" == *.xapk ]] \
              && unzip -p "$FOUND" "${YOUTUBE_PKG}.apk" > youtube.apk \
              || mv "$FOUND" youtube.apk
          fi
          echo "OK: $(du -sh youtube.apk)"

      - name: Download YouTube Music APK
        id: dl_ytm
        continue-on-error: true
        run: |
          echo "Downloading YouTube Music $YOUTUBE_MUSIC_VERSION"
          ./apkeep -a "${YOUTUBE_MUSIC_PKG}@${YOUTUBE_MUSIC_VERSION}" -d APKPure . 2>&1 || true

          if [ -f "${YOUTUBE_MUSIC_PKG}_${YOUTUBE_MUSIC_VERSION}.apk" ]; then
            mv "${YOUTUBE_MUSIC_PKG}_${YOUTUBE_MUSIC_VERSION}.apk" youtube-music.apk
          elif [ -f "${YOUTUBE_MUSIC_PKG}_${YOUTUBE_MUSIC_VERSION}.xapk" ]; then
            unzip -p "${YOUTUBE_MUSIC_PKG}_${YOUTUBE_MUSIC_VERSION}.xapk" "${YOUTUBE_MUSIC_PKG}.apk" > youtube-music.apk
          else
            FOUND=$(find . -maxdepth 1 \
              \( -name "${YOUTUBE_MUSIC_PKG}*.apk" -o -name "${YOUTUBE_MUSIC_PKG}*.xapk" \) \
              ! -name "*revanced*" | head -1)
            if [ -z "$FOUND" ]; then echo "ERROR: no APK downloaded for YouTube Music" && exit 1; fi
            [[ "$FOUND" == *.xapk ]] \
              && unzip -p "$FOUND" "${YOUTUBE_MUSIC_PKG}.apk" > youtube-music.apk \
              || mv "$FOUND" youtube-music.apk
          fi
          echo "OK: $(du -sh youtube-music.apk)"

      - name: Download Spotify APK
        id: dl_spo
        continue-on-error: true
        run: |
          echo "Downloading Spotify $SPOTIFY_VERSION"
          ./apkeep -a "${SPOTIFY_PKG}@${SPOTIFY_VERSION}" -d APKPure . 2>&1 || true

          if [ -f "${SPOTIFY_PKG}_${SPOTIFY_VERSION}.apk" ]; then
            mv "${SPOTIFY_PKG}_${SPOTIFY_VERSION}.apk" spotify.apk
          elif [ -f "${SPOTIFY_PKG}_${SPOTIFY_VERSION}.xapk" ]; then
            unzip -p "${SPOTIFY_PKG}_${SPOTIFY_VERSION}.xapk" "${SPOTIFY_PKG}.apk" > spotify.apk
          else
            FOUND=$(find . -maxdepth 1 \
              \( -name "${SPOTIFY_PKG}*.apk" -o -name "${SPOTIFY_PKG}*.xapk" \) \
              ! -name "*revanced*" | head -1)
            if [ -z "$FOUND" ]; then echo "ERROR: no APK downloaded for Spotify" && exit 1; fi
            [[ "$FOUND" == *.xapk ]] \
              && unzip -p "$FOUND" "${SPOTIFY_PKG}.apk" > spotify.apk \
              || mv "$FOUND" spotify.apk
          fi
          echo "OK: $(du -sh spotify.apk)"

      # ── Restore keystore ───────────────────────────────────────────────────────
      - name: Restore signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      # ── Patch each app ─────────────────────────────────────────────────────────
      - name: Patch YouTube
        if: steps.dl_yt.outcome == 'success'
        continue-on-error: true
        run: |
          java -jar revanced-cli.jar patch \
            --patch-bundle patches.mpp \
            --keystore keystore.jks \
            --keystore-entry-alias    "${{ secrets.KEY_ALIAS }}" \
            --keystore-entry-password "${{ secrets.KEY_PASSWORD }}" \
            --keystore-password       "${{ secrets.KEYSTORE_PASSWORD }}" \
            -o youtube-revanced.apk \
            youtube.apk

      - name: Patch YouTube Music
        if: steps.dl_ytm.outcome == 'success'
        continue-on-error: true
        run: |
          java -jar revanced-cli.jar patch \
            --patch-bundle patches.mpp \
            --keystore keystore.jks \
            --keystore-entry-alias    "${{ secrets.KEY_ALIAS }}" \
            --keystore-entry-password "${{ secrets.KEY_PASSWORD }}" \
            --keystore-password       "${{ secrets.KEYSTORE_PASSWORD }}" \
            -o youtube-music-revanced.apk \
            youtube-music.apk

      - name: Patch Spotify
        if: steps.dl_spo.outcome == 'success'
        continue-on-error: true
        run: |
          java -jar revanced-cli.jar patch \
            --patch-bundle patches.mpp \
            --keystore keystore.jks \
            --keystore-entry-alias    "${{ secrets.KEY_ALIAS }}" \
            --keystore-entry-password "${{ secrets.KEY_PASSWORD }}" \
            --keystore-password       "${{ secrets.KEYSTORE_PASSWORD }}" \
            -o spotify-revanced.apk \
            spotify.apk

      # ── Build AdShield app ─────────────────────────────────────────────────────
      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Build and sign AdShield APK
        id: adshield
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

          UNSIGNED=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then
            echo "Gradle build produced no APK — skipping"
            exit 0
          fi

          TOOLS=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d \
                  | sort -V | tail -1)
          "$TOOLS/zipalign" -v 4 "$UNSIGNED" adshield-aligned.apk
          "$TOOLS/apksigner" sign \
            --ks           keystore.jks \
            --ks-pass      "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass     "pass:${{ secrets.KEY_PASSWORD }}" \
            --out          adshield-release.apk \
            adshield-aligned.apk
          echo "AdShield signed: $(du -sh adshield-release.apk)"

      # ── Publish release ────────────────────────────────────────────────────────
      - name: Publish GitHub Release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name:                ${{ env.TAG }}
          name:                    "AdShield Patches — ${{ env.DATE }}"
          make_latest:             "true"
          fail_on_unmatched_files: false
          body: |
            ## AdShield Patches — ${{ env.DATE }}

            ### Tool versions
            - ReVanced CLI: `${{ steps.cli.outputs.CLI_VER }}`
            - ReVanced Patches (anddea): `${{ steps.patches.outputs.PATCHES_VER }}`

            ### Target versions
            | App | Version |
            |-----|---------|
            | YouTube | ${{ env.YOUTUBE_VERSION }} |
            | YouTube Music | ${{ env.YOUTUBE_MUSIC_VERSION }} |
            | Spotify | ${{ env.SPOTIFY_VERSION }} |

            *Auto-built by [GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          files: |
            youtube-revanced.apk
            youtube-music-revanced.apk
            spotify-revanced.apk
            adshield-release.apk

      # ── Job summary ────────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          {
            echo "## ${{ env.DATE }} patch results"
            echo "| App | Result |"
            echo "|-----|--------|"
            [ -f youtube-revanced.apk ]       && echo "| YouTube       | ✅ |" || echo "| YouTube       | ❌ |"
            [ -f youtube-music-revanced.apk ] && echo "| YouTube Music | ✅ |" || echo "| YouTube Music | ❌ |"
            [ -f spotify-revanced.apk ]       && echo "| Spotify       | ✅ |" || echo "| Spotify       | ❌ |"
            [ -f adshield-release.apk ]       && echo "| AdShield      | ✅ |" || echo "| AdShield      | ❌ |"
          } >> $GITHUB_STEP_SUMMARY
