name: Build AdShield Patches

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday midnight UTC

# ─── Target APK versions ───────────────────────────────────────────────────────
# TODO: Update these when `java -jar revanced-cli.jar list-patches --with-packages
#       revanced-patches.rvp` shows a newer compatible version.
# Check current support at: https://revanced.app/patches
env:
  YOUTUBE_PKG:           com.google.android.youtube
  YOUTUBE_VERSION:       "19.47.53"
  YOUTUBE_MUSIC_PKG:     com.google.android.apps.youtube.music
  YOUTUBE_MUSIC_VERSION: "7.25.52"
  SPOTIFY_PKG:           com.spotify.music
  SPOTIFY_VERSION:       "8.6.96.1103"

jobs:
  patch-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      # ── Setup ─────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate secrets
        run: |
          missing=""
          [ -z "${{ secrets.KEYSTORE_BASE64 }}"  ] && missing="$missing KEYSTORE_BASE64"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && missing="$missing KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_ALIAS }}"         ] && missing="$missing KEY_ALIAS"
          [ -z "${{ secrets.KEY_PASSWORD }}"      ] && missing="$missing KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub secrets:$missing"
            echo "See PATCHES.md → 'One-time setup' for instructions."
            exit 1
          fi

      - name: Set release tag
        id: tag
        run: |
          echo "TAG=v$(date +%Y.%m.%d)"     >> $GITHUB_OUTPUT
          echo "DATE=$(date '+%Y-%m-%d')"   >> $GITHUB_OUTPUT

      # ── Download ReVanced tools ────────────────────────────────────────────────
      - name: Download ReVanced CLI and patches
        id: tools
        run: |
          # -sS  : silent but print errors (SSL failures, network errors)
          # -L   : follow redirects
          # -o   : save body to file so we can print it on failure
          # -w   : write HTTP status code to stdout (separated from body)
          # No -f: we check the HTTP code ourselves so we can show the response body

          api_get() {
            local url=$1 outfile=$2
            local http_code
            http_code=$(curl -sSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -o "$outfile" \
              -w "%{http_code}" \
              "$url")
            echo "HTTP $http_code  ←  $url"
            if [ "$http_code" != "200" ]; then
              echo "::error::GitHub API returned HTTP $http_code"
              echo "--- response body ---"
              cat "$outfile"
              echo "--- end ---"
              return 1
            fi
          }

          api_get \
            "https://api.github.com/repos/ReVanced/revanced-cli/releases/latest" \
            cli_release.json

          CLI_URL=$(jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' \
                    cli_release.json | head -1)
          CLI_VER=$(jq -r '.tag_name' cli_release.json)

          if [ -z "$CLI_URL" ] || [ "$CLI_URL" = "null" ]; then
            echo "::error::No .jar asset in revanced-cli release. Available assets:"
            jq -r '.assets[].name' cli_release.json
            exit 1
          fi

          # revanced-patches moved to GitLab after GitHub DMCA takedown (March 2026).
          # The GitLab release contains only source archives — no pre-built .rvp binary.
          # We build the .rvp ourselves from the released source tarball.
          # revanced-integrations is bundled inside the .rvp since CLI v4; no separate download needed.
          PATCHES_HTTP=$(curl -sSL \
            -o patches_release.json \
            -w "%{http_code}" \
            "https://gitlab.com/api/v4/projects/revanced%2Frevanced-patches/releases/permalink/latest")
          echo "HTTP $PATCHES_HTTP  ←  GitLab revanced-patches"
          if [ "$PATCHES_HTTP" != "200" ]; then
            echo "::error::GitLab API returned HTTP $PATCHES_HTTP for revanced-patches"
            cat patches_release.json
            exit 1
          fi

          PATCHES_VER=$(jq -r '.tag_name' patches_release.json)
          SOURCE_URL=$(jq -r '.assets.sources[] | select(.format == "tar.gz") | .url' \
                       patches_release.json | head -1)

          if [ -z "$SOURCE_URL" ] || [ "$SOURCE_URL" = "null" ]; then
            echo "::error::No tar.gz source archive in revanced-patches release. Available sources:"
            jq '.assets.sources' patches_release.json
            exit 1
          fi

          echo "Building revanced-patches $PATCHES_VER from source"
          echo "Source: $SOURCE_URL"
          curl -sSL --fail-with-body "$SOURCE_URL" -o patches-src.tar.gz

          mkdir revanced-patches-src
          tar -xzf patches-src.tar.gz -C revanced-patches-src --strip-components=1

          pushd revanced-patches-src
          chmod +x gradlew
          ./gradlew build --no-daemon -x test
          popd

          # Prefer .rvp (native CLI v4+ format); fall back to fat/shadow jar
          PATCHES_FILE=$(find revanced-patches-src/build/libs -name "*.rvp" | head -1)
          if [ -z "$PATCHES_FILE" ]; then
            PATCHES_FILE=$(find revanced-patches-src/build/libs -name "*-all.jar" \
              ! -name "*sources*" ! -name "*javadoc*" | head -1)
          fi
          if [ -z "$PATCHES_FILE" ]; then
            PATCHES_FILE=$(find revanced-patches-src/build/libs -name "*.jar" \
              ! -name "*sources*" ! -name "*javadoc*" ! -name "*stub*" | head -1)
          fi

          if [ -z "$PATCHES_FILE" ]; then
            echo "::error::Gradle build produced no artifact. Contents of build/libs/:"
            ls -la revanced-patches-src/build/libs/ 2>/dev/null || echo "(directory missing)"
            exit 1
          fi

          echo "Patches artifact: $(du -sh "$PATCHES_FILE") — $PATCHES_FILE"
          cp "$PATCHES_FILE" revanced-patches.rvp

          echo "CLI URL:  $CLI_URL  ($CLI_VER)"
          echo "Patches:  built from source $PATCHES_VER  →  revanced-patches.rvp"

          curl -sSL --fail-with-body "$CLI_URL" -o revanced-cli.jar

          echo "CLI_VER=$CLI_VER"         >> $GITHUB_OUTPUT
          echo "PATCHES_VER=$PATCHES_VER" >> $GITHUB_OUTPUT
          echo "Downloads complete: CLI $CLI_VER, Patches $PATCHES_VER"

      # ── Download APKs from APKPure ─────────────────────────────────────────────
      - name: Install apkeep
        run: |
          HTTP=$(curl -sSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -o apkeep_release.json \
            -w "%{http_code}" \
            "https://api.github.com/repos/EFForg/apkeep/releases/latest")
          echo "apkeep API: HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::error::GitHub API returned HTTP $HTTP for apkeep"
            cat apkeep_release.json
            exit 1
          fi

          APKEEP_URL=$(jq -r '.assets[] | select(.name | (contains("x86_64") and contains("linux"))) | .browser_download_url' \
                       apkeep_release.json | head -1)
          if [ -z "$APKEEP_URL" ] || [ "$APKEEP_URL" = "null" ]; then
            echo "::error::No x86_64 Linux asset found for apkeep. Available assets:"
            jq -r '.assets[].name' apkeep_release.json
            exit 1
          fi

          curl -sSL --fail-with-body "$APKEEP_URL" -o apkeep
          chmod +x apkeep

      - name: Download APKs from APKPure
        run: |
          # Downloads <pkg>@<version> from APKPure via apkeep.
          # APKPure sometimes bundles apps as .xapk (ZIP of split APKs);
          # we extract just the base APK in that case.
          fetch_apk() {
            local pkg=$1 version=$2 out=$3

            echo "==> $pkg @ $version"
            ./apkeep -a "${pkg}@${version}" -d APKPure . 2>&1 || true

            if [ -f "${pkg}_${version}.apk" ]; then
              mv "${pkg}_${version}.apk" "$out"
            elif [ -f "${pkg}_${version}.xapk" ]; then
              echo "XAPK detected — extracting base APK"
              unzip -p "${pkg}_${version}.xapk" "${pkg}.apk" > "$out"
            else
              # Fallback: find any apkeep output file (version string may differ)
              local found
              found=$(find . -maxdepth 1 \
                \( -name "${pkg}*.apk" -o -name "${pkg}*.xapk" \) \
                ! -name "*revanced*" | head -1)
              if [ -z "$found" ]; then
                echo "ERROR: no APK downloaded for $pkg" >&2
                return 1
              fi
              [[ "$found" == *.xapk ]] \
                && unzip -p "$found" "${pkg}.apk" > "$out" \
                || mv "$found" "$out"
            fi
            echo "OK: $(du -sh "$out")"
          }

          fetch_apk "$YOUTUBE_PKG"       "$YOUTUBE_VERSION"       youtube-original.apk       || echo "YT_FAIL=1"  >> $GITHUB_ENV
          fetch_apk "$YOUTUBE_MUSIC_PKG" "$YOUTUBE_MUSIC_VERSION" youtube-music-original.apk || echo "YTM_FAIL=1" >> $GITHUB_ENV
          fetch_apk "$SPOTIFY_PKG"       "$SPOTIFY_VERSION"       spotify-original.apk        || echo "SPO_FAIL=1" >> $GITHUB_ENV

      # ── Signing keystore ──────────────────────────────────────────────────────
      - name: Restore signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      # ── Patch each app ────────────────────────────────────────────────────────
      # Each step is independent; continue-on-error keeps the rest running even if
      # one app's patch fails (e.g. because ReVanced dropped support for that version).
      - name: Patch YouTube
        if: env.YT_FAIL != '1'
        continue-on-error: true
        run: |
          java -jar revanced-cli.jar patch \
            --patch-bundle            revanced-patches.rvp \
            --keystore                release.keystore \
            --keystore-entry-alias    "${{ secrets.KEY_ALIAS }}" \
            --keystore-entry-password "${{ secrets.KEY_PASSWORD }}" \
            --keystore-password       "${{ secrets.KEYSTORE_PASSWORD }}" \
            -o youtube-revanced.apk \
            youtube-original.apk

      - name: Patch YouTube Music
        if: env.YTM_FAIL != '1'
        continue-on-error: true
        run: |
          java -jar revanced-cli.jar patch \
            --patch-bundle            revanced-patches.rvp \
            --keystore                release.keystore \
            --keystore-entry-alias    "${{ secrets.KEY_ALIAS }}" \
            --keystore-entry-password "${{ secrets.KEY_PASSWORD }}" \
            --keystore-password       "${{ secrets.KEYSTORE_PASSWORD }}" \
            -o youtube-music-revanced.apk \
            youtube-music-original.apk

      - name: Patch Spotify
        if: env.SPO_FAIL != '1'
        continue-on-error: true
        run: |
          java -jar revanced-cli.jar patch \
            --patch-bundle            revanced-patches.rvp \
            --keystore                release.keystore \
            --keystore-entry-alias    "${{ secrets.KEY_ALIAS }}" \
            --keystore-entry-password "${{ secrets.KEY_PASSWORD }}" \
            --keystore-password       "${{ secrets.KEYSTORE_PASSWORD }}" \
            -o spotify-revanced.apk \
            spotify-original.apk

      # ── Build AdShield app ────────────────────────────────────────────────────
      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" "build-tools;36.1.0" 2>&1 | tail -5

      - name: Build and sign AdShield APK
        id: adshield
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

          UNSIGNED=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then
            echo "Gradle build produced no APK — skipping signing"
            exit 0
          fi

          TOOLS=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d \
                  | sort -V | tail -1)
          "$TOOLS/zipalign"  -v 4 "$UNSIGNED" adshield-aligned.apk
          "$TOOLS/apksigner" sign \
            --ks           release.keystore \
            --ks-pass      "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass     "pass:${{ secrets.KEY_PASSWORD }}" \
            --out          adshield-release.apk \
            adshield-aligned.apk
          echo "AdShield signed: $(du -sh adshield-release.apk)"

      # ── Publish release ───────────────────────────────────────────────────────
      - name: Build release notes
        id: notes
        run: |
          row() {
            local file=$1 label=$2
            [ -f "$file" ] \
              && echo "| $label | ✅ Patched |" \
              || echo "| $label | ❌ Failed — [see logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          }
          {
            echo "BODY<<DELIMEOF"
            echo "## AdShield Patches — ${{ steps.tag.outputs.DATE }}"
            echo ""
            echo "### Assets"
            echo "| App | Status |"
            echo "|-----|--------|"
            row youtube-revanced.apk       "YouTube ReVanced (v${YOUTUBE_VERSION})"
            row youtube-music-revanced.apk "YouTube Music ReVanced (v${YOUTUBE_MUSIC_VERSION})"
            row spotify-revanced.apk       "Spotify ReVanced (v${SPOTIFY_VERSION})"
            row adshield-release.apk       "AdShield app"
            echo ""
            echo "### Tool versions"
            echo "- ReVanced CLI: \`${{ steps.tools.outputs.CLI_VER }}\`"
            echo "- ReVanced Patches: \`${{ steps.tools.outputs.PATCHES_VER }}\`"
            echo ""
            echo "*Auto-built by [GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
            echo "DELIMEOF"
          } >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:                ${{ steps.tag.outputs.TAG }}
          name:                    "AdShield Patches — ${{ steps.tag.outputs.DATE }}"
          body:                    ${{ steps.notes.outputs.BODY }}
          make_latest:             "true"
          fail_on_unmatched_files: false
          files: |
            youtube-revanced.apk
            youtube-music-revanced.apk
            spotify-revanced.apk
            adshield-release.apk

      # ── Job summary ───────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          {
            echo "## ${{ steps.tag.outputs.DATE }} patch results"
            echo "| App | Result |"
            echo "|-----|--------|"
            [ -f youtube-revanced.apk ]       && echo "| YouTube       | ✅ |" || echo "| YouTube       | ❌ |"
            [ -f youtube-music-revanced.apk ] && echo "| YouTube Music | ✅ |" || echo "| YouTube Music | ❌ |"
            [ -f spotify-revanced.apk ]       && echo "| Spotify       | ✅ |" || echo "| Spotify       | ❌ |"
            [ -f adshield-release.apk ]       && echo "| AdShield      | ✅ |" || echo "| AdShield      | ❌ |"
          } >> $GITHUB_STEP_SUMMARY
